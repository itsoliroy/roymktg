        <script>
  (function () {
    var isMobile = window.matchMedia("(max-width: 800px)").matches;
    if (isMobile) {
      var menuToggle = document.querySelector(".menu-toggle");
      var menuOverlay = document.getElementById("mobile-menu");
      if (menuToggle && menuOverlay) {
        var overlayLinks = menuOverlay.querySelectorAll("a");

        var setMenuState = function (isOpen) {
          document.body.classList.toggle("menu-open", isOpen);
          menuToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
        };

        menuToggle.addEventListener("click", function () {
          var nextState = menuToggle.getAttribute("aria-expanded") !== "true";
          setMenuState(nextState);
        });

        overlayLinks.forEach(function (link) {
          link.addEventListener("click", function () {
            setMenuState(false);
          });
        });

        menuOverlay.addEventListener("click", function (event) {
          if (event.target === menuOverlay) {
            setMenuState(false);
          }
        });
      }
    }

  })();
</script>
